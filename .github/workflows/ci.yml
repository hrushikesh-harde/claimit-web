name: CI

# =============================================================================
# CI Pipeline - claimit-web
# =============================================================================
# Runs secret scan on EVERY branch and EVERY pull request.
# =============================================================================

on:
  push:           # ALL branches — no filter
  pull_request:   # ALL pull requests

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # Secret scan — runs on every push to every branch
  secret-scan:
    name: "Secret Scan (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is critical — scans the FULL git history,
          # not just the latest commit. Without this, Gitleaks only
          # sees the tip of the branch and misses previously committed secrets.
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/gitleaks/gitleaks/releases/latest | grep browser_download_url | grep linux_x64.tar.gz | cut -d '"' -f 4)
          curl -sL "$DOWNLOAD_URL" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gitleaks detect --source . -v
