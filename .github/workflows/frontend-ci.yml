name: Frontend CI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  IMAGE_NAME: claimit-frontend-ci
  CONTAINER_NAME: claimit-frontend-ci-test
  HOST_PORT: 5173
  CONTAINER_PORT: 4173

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          set -euo pipefail
          docker build \
            --build-arg VITE_API_BASE_URL="$VITE_API_BASE_URL" \
            -t "$IMAGE_NAME" \
            .

      - name: Start frontend container
        run: |
          set -euo pipefail
          docker run -d --name "$CONTAINER_NAME" -p "$HOST_PORT:$CONTAINER_PORT" "$IMAGE_NAME"

      - name: Wait for frontend startup
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if docker ps --filter "name=^/${CONTAINER_NAME}$" --format '{{.Names}}' | grep -q .; then
              if curl -fsS "http://127.0.0.1:$HOST_PORT/" >/dev/null 2>&1; then
                echo "Frontend is responding"
                break
              fi
            else
              echo "Container exited unexpectedly"
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            if [ "$i" -eq 30 ]; then
              echo "Frontend did not become ready in time"
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            sleep 2
          done

      - name: Smoke test frontend
        run: |
          set -euo pipefail
          curl -fsS "http://127.0.0.1:$HOST_PORT/" >/dev/null
          curl -fsS "http://127.0.0.1:$HOST_PORT/login" >/dev/null

      # TEMPORARY DEBUG STEP
      # Reads the ACTUAL OIDC token issued by GitHub.
      - name: Inspect actual GitHub OIDC claims
        shell: bash
        run: |
          set -euo pipefail

          echo "Requesting GitHub OIDC token..."

          RESPONSE=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=sts.amazonaws.com")

          TOKEN=$(echo "$RESPONSE" | jq -r '.value')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to obtain GitHub OIDC token"
            echo "$RESPONSE"
            exit 1
          fi

          PAYLOAD=$(echo "$TOKEN" | cut -d '.' -f2)

          # Convert JWT base64url encoding to standard base64
          PAYLOAD=$(echo "$PAYLOAD" | tr '_-' '/+')

          # Add required base64 padding
          case $((${#PAYLOAD} % 4)) in
            2) PAYLOAD="${PAYLOAD}==" ;;
            3) PAYLOAD="${PAYLOAD}=" ;;
          esac

          echo ""
          echo "========== ACTUAL GITHUB OIDC CLAIMS =========="

          echo "$PAYLOAD" | base64 -d | jq '{
            iss,
            aud,
            sub,
            repository,
            repository_owner,
            ref,
            workflow,
            job_workflow_ref,
            event_name
          }'

          echo "================================================"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: claimit-frontend-${{ github.run_id }}

      # TEMPORARY DEBUG STEP
      # This will only run if OIDC authentication succeeds.
      - name: Verify AWS identity
        run: |
          echo "AWS OIDC authentication succeeded"
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
        run: |
          set -euo pipefail

          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          ECR_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker tag "$IMAGE_NAME" "$ECR_IMAGE"
          docker push "$ECR_IMAGE"

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "Container status:"
          docker ps -a --filter "name=^/${CONTAINER_NAME}$" || true

          echo "Container logs:"
          docker logs "$CONTAINER_NAME" || true

      - name: Cleanup test container
        if: always()
        run: |
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true